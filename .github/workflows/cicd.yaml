name: cicd

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.sha.outputs.short }}
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jtandy/python-idp-app:${{ steps.sha.outputs.short }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4

      # 1. Installs the standalone yq binary instantly
      - 
        name: Set up yq
        uses: mikefarah/yq-action@v4
      - 
        name: Modify values for Argo CD
        shell: bash
        run: |
          echo ${{ needs.ci.outputs.commit_id }}
          pip install yq
          yq -Yi '.image.tag = "${{ needs.ci.outputs.commit_id }}"' charts/python-idp-app/values.yaml
      -
        name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: "Updates values.yaml with commit id ${{ needs.ci.outputs.commit_id }}"
      -
        name: Install Argo CD CLI
        run: |
          # Grab the latest version number
          VERSION=$(curl -s "https://api.github.com/repos/argoproj/argo-cd/releases/latest" | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')

          # Download from GitHub directly using the -f flag so it fails instantly if it 404s
          curl -f -sSL -o argocd "https://github.com/argoproj/argo-cd/releases/download/$VERSION/argocd-linux-amd64"

          # Make executable and move to PATH
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
      -
        name: Argocd app sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-idp-app