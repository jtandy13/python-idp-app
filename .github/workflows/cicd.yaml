name: cicd

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jtandy/python-idp-app:${{ steps.sha.outputs.short }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      -
        name: Argocd app sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-idp-app --revision ${GITHUB_SHA::7}