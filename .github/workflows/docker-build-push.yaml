name: ci

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  docker:
    runs-on: self-hosted
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jtandy/python-idp-app:${{ steps.sha.outputs.short }}